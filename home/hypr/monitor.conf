# monitor.conf — explicit output layout for Hyprland
# Entries for connectors not present on the running host are silently ignored.

# ── Desktop: dual 1080p ────────────────────────────────────────────────
monitor = DP-2, 1920x1080@60, 0x0, 1
monitor = DP-3, 1920x1080@60, 1920x0, 1

# ── Surface: HiDPI internal ───────────────────────────────────────────
monitor = eDP-1, 2160x1440, auto, 1.5

# ── Fallback: any unlisted display ────────────────────────────────────
monitor = , preferred, auto, 1
