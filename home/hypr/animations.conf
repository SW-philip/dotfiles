animations {
    enabled = true

    bezier = easeOut, 0.16, 1, 0.3, 1
    bezier = easeInOutSoft, 0.4, 0, 0.2, 1
    bezier = snap, 0.2, 0.9, 0.2, 1.1

    animation = windows, 1, 6, easeOut
    animation = windowsOut, 1, 5, easeInOutSoft, popin 70%
    animation = border, 1, 4, snap
    animation = fade, 1, 5, easeOut
    animation = workspaces, 1, 6, easeOut, slide
    animation = windowsMove, 1, 10, easeOut
}
