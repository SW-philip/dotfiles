###############################################################################
# Window Geometry — sane defaults (NO AUTO FULLSCREEN)
# Hyprland 0.53+ / 0.54 syntax
###############################################################################

# -----------------------
# Terminals
# -----------------------
windowrule = opacity 0.85 0.5, match:class ^(com.mitchellh.ghostty)$

# -----------------------
# Browsers
# -----------------------
windowrule = tile on,                     match:class ^(firefox|brave|chromium|vivaldi)$
windowrule = size 92% 90%,                match:class ^(firefox|brave|chromium|vivaldi)$
windowrule = center on,                   match:class ^(firefox|brave|chromium|vivaldi)$
windowrule = suppress_event fullscreen,   match:class ^(firefox|brave|chromium|vivaldi)$

# -----------------------
# Code editors
# -----------------------
windowrule = tile on,                     match:class ^(Code|code-oss|cursor)$
windowrule = size 88% 94%,                match:class ^(Code|code-oss|cursor)$
windowrule = center on,                   match:class ^(Code|code-oss|cursor)$
windowrule = suppress_event fullscreen,   match:class ^(Code|code-oss|cursor)$

# -----------------------
# Music players (floating zone)
# -----------------------
windowrule = float on,                    match:class ^(Spotify|ncspot|Tauon|Lollypop)$
windowrule = size 32% 36%,                match:class ^(Spotify|ncspot|Tauon|Lollypop)$
windowrule = move 64% 56%,                match:class ^(Spotify|ncspot|Tauon|Lollypop)$
windowrule = suppress_event fullscreen,   match:class ^(Spotify|ncspot|Tauon|Lollypop)$

# -----------------------
# Utilities (always floating)
# -----------------------
windowrule = float on,     match:class ^(pavucontrol|blueman-manager|nm-connection-editor|Gpick)$
windowrule = size 28% 32%, match:class ^(pavucontrol|blueman-manager|nm-connection-editor|Gpick)$
windowrule = center on,    match:class ^(pavucontrol|blueman-manager|nm-connection-editor|Gpick)$

###############################################################################
# File dialogs / choosers
# `match:transient` is gone — match on xdg-desktop-portal classes instead
###############################################################################
windowrule = float on,                  match:class ^(org\.freedesktop\.impl\.portal\.desktop\.gnome|org\.freedesktop\.impl\.portal\.desktop\.hyprland)$
windowrule = center on,                 match:class ^(org\.freedesktop\.impl\.portal\.desktop\.gnome|org\.freedesktop\.impl\.portal\.desktop\.hyprland)$
windowrule = size 70% 70%,              match:class ^(org\.freedesktop\.impl\.portal\.desktop\.gnome|org\.freedesktop\.impl\.portal\.desktop\.hyprland)$
windowrule = suppress_event fullscreen, match:class ^(org\.freedesktop\.impl\.portal\.desktop\.gnome|org\.freedesktop\.impl\.portal\.desktop\.hyprland)$

###############################################################################
# Cava — visualizer pinned to bottom of DP-3 (right monitor)
###############################################################################
windowrule = float on,             match:title ^(cava-overlay)$
windowrule = move 1920 1000,       match:title ^(cava-overlay)$
windowrule = size 1920 88,         match:title ^(cava-overlay)$
windowrule = no_shadow on,         match:title ^(cava-overlay)$
windowrule = no_blur on,           match:title ^(cava-overlay)$
windowrule = no_initial_focus on,  match:title ^(cava-overlay)$
windowrule = pin on,               match:title ^(cava-overlay)$
windowrule = opacity 0.0 override 0.0 override, match:title ^(cava-overlay)$
