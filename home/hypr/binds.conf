###############################################################################
# ⌨️ Keybinds
###############################################################################
$mod = SUPER

# ── Launchers ─────────────────────────────────────────────────────────────
bind = $mod,       RETURN, exec, ghostty
bind = $mod,       SPACE,  exec, fuzzel --anchor top --y-margin 11 --border-width 2 --border-radius 6
bind = $mod,       E,      exec, nemo

# ── Window management ─────────────────────────────────────────────────────
bind = $mod,       Q, killactive
bind = $mod,       F, fullscreen, 0
bind = $mod SHIFT, F, togglefloating
bind = $mod,       C, centerwindow

# ── Session ───────────────────────────────────────────────────────────────
bind = $mod SHIFT, R, exec, hyprctl reload
bind = $mod SHIFT, E, exit
bind = $mod SHIFT, P, exec, hyprctl dispatch dpms off
bind = $mod,       Escape, exec, hyprlock

# ── Focus windows ─────────────────────────────────────────────────────────
bind = $mod, left,  movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up,    movefocus, u
bind = $mod, down,  movefocus, d
bind = $mod, H, movefocus, l
bind = $mod, J, movefocus, d
bind = $mod, K, movefocus, u
bind = $mod, L, movefocus, r

# ── Move windows (Shift + HJKL) ───────────────────────────────────────────
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, L, movewindow, r
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, J, movewindow, d

# ── Swap windows (Alt + HJKL) ────────────────────────────────────────────
bind = $mod ALT, H, swapwindow, l
bind = $mod ALT, L, swapwindow, r
bind = $mod ALT, K, swapwindow, u
bind = $mod ALT, J, swapwindow, d

# ── Resize windows (Ctrl + HJKL) ─────────────────────────────────────────
bind = $mod CTRL, H, resizeactive, -40 0
bind = $mod CTRL, L, resizeactive,  40 0
bind = $mod CTRL, K, resizeactive,  0 -40
bind = $mod CTRL, J, resizeactive,  0  40

# ── Layout (Hyprland-specific) ────────────────────────────────────────────
bind = $mod, S, layoutmsg, togglesplit
bind = $mod, R, layoutmsg, cyclenext
# Scrolling layout navigation (workspaces 7 & 8)
bind = $mod CTRL,       right, layoutmsg, scrollright
bind = $mod CTRL,       left,  layoutmsg, scrollleft
bind = $mod CTRL SHIFT, right, layoutmsg, scrollrightwindow
bind = $mod CTRL SHIFT, left,  layoutmsg, scrollleftwindow

# ── Workspaces ────────────────────────────────────────────────────────────
bind = $mod,       TAB, workspace, e+1
bind = $mod SHIFT, TAB, workspace, e-1
bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up,   workspace, e-1
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

# ── Scratchpads ───────────────────────────────────────────────────────────
bind = $mod, grave,      exec, ghostty --class=Scratch1
bind = $mod, bracketleft, exec, ghostty --class=Scratch2

# ── Volume / Brightness ───────────────────────────────────────────────────
bindle = , XF86AudioRaiseVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindle = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind   = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindle = , F6,                    exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindle = , F5,                    exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind   = , F4,                    exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindle = , XF86MonBrightnessUp,   exec, brightnessctl s +5%
bindle = , XF86MonBrightnessDown, exec, brightnessctl s 5%-

# ── QoL helpers ───────────────────────────────────────────────────────────
bind = $mod ALT, B, exec, pkill -SIGUSR2 waybar || waybar -c ~/.config/waybar/config.json -s ~/.config/waybar/style.css

# ── Mouse ─────────────────────────────────────────────────────────────────
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow
bindm = , BTN_STYLUS, movewindow

###############################################################################
# 📸 Screenshots (grim + slurp + wl-copy)
###############################################################################
bind = SHIFT, Print, exec, bash -c 'grim -g "$(hyprctl activewindow -j | jq -r ".at[0],.at[1],.size[0],.size[1]" | tr "\n" "," | sed "s/,$//")" -t png - | wl-copy'
bind = $mod,  Print, exec, bash -c 'grim -t png - | wl-copy'
bind = ,      Print, exec, bash -c 'grim -g "$(slurp)" -t png - | wl-copy'
