# home/niri/ironbar-single.toml
# Single-monitor: DP-2 top bar (desktop) or eDP-1 top bar (Surface).
# Unknown connectors are silently ignored.

[monitors]

# ── Surface: single top bar (eDP-1) ────────────────────────────────────

[monitors."eDP-1"]
position = "top"
anchor_to_edges = true
height = 36

[[monitors."eDP-1".start]]
type = "workspaces"
name = "workspaces"

[[monitors."eDP-1".start]]
type = "script"
name = "cpu_temp"
cmd = "cpu_temp | jq -r '.text'"
mode = "poll"
interval = 8

[[monitors."eDP-1".start]]
type = "script"
name = "battery"
cmd = "battery | jq -r '.text'"
mode = "poll"
interval = 30

[[monitors."eDP-1".center]]
type = "script"
name = "clock"
cmd = "caliper-clock"
mode = "poll"
interval = 60

[[monitors."eDP-1".center]]
type = "script"
name = "weather"
cmd = "waybar-weather | jq -r '.text'"
mode = "poll"
interval = 300

[[monitors."eDP-1".end]]
type = "tray"
name = "tray"

[[monitors."eDP-1".end]]
type = "script"
name = "bluetooth"
cmd = "quantum-bluetooth | jq -r '.text'"
mode = "poll"
interval = 30
on_click_left = "quantum-btmenu"
on_click_right = "quantum-bt-toggle"

[[monitors."eDP-1".end]]
type = "script"
name = "network"
cmd = "netstatus | jq -r '.text'"
mode = "poll"
interval = 5
on_click_left = "~/.config/waybar/scripts/quantum-wifimenu.sh"
on_click_right = "~/.config/waybar/scripts/vpn-toggle.sh"

[[monitors."eDP-1".end]]
type = "script"
name = "music"
cmd = "mpris-watch"
mode = "poll"
interval = 5
truncate.mode = "end"
truncate.max_length = 35
on_click_left = "sqlch-popup"
on_click_right = "~/.config/waybar/scripts/waybar-sqlch --stop"
on_click_middle = "~/.config/waybar/scripts/waybar-sqlch --pick"
on_scroll_up = "~/.config/waybar/scripts/waybar-sqlch --next"
on_scroll_down = "~/.config/waybar/scripts/waybar-sqlch --prev"

[[monitors."eDP-1".end]]
type = "volume"
name = "volume"

[[monitors."eDP-1".end]]
type = "script"
name = "uniremote"
cmd = "echo '󰑗'"
mode = "poll"
interval = 86400
on_click_left = "uniremote"

[[monitors."eDP-1".end]]
type = "script"
name = "toggle_theme"
cmd = "echo '󰔎'"
mode = "poll"
interval = 86400
on_click_left = "toggle-theme"

[[monitors."eDP-1".end]]
type = "script"
name = "wleave"
cmd = "echo '󰩈'"
mode = "poll"
interval = 86400
on_click_left = "wleave"

# ── Desktop single monitor (DP-2): full top bar ─────────────────────────
# DP-3 is disabled via kanshi; all modules live here.

[monitors."DP-2"]
